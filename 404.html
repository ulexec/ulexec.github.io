<script>
$(document).ready(function () {
    function start() {
        var originalText = $('.code').text().trim(); 
        var OGarray = originalText.split(''); 
        var obfuscatedText;
        var revealIndex = 0; 
        var intervalTime = 5; 
        var delayBeforeStart = 400; 
        var phase = 1; 
        var convertedIndices = new Map(); 
        var interval; 
        const hexTransformations = 15; 

        
        function willOverflow(text) {
            let testElement = $('<span>')
                .text(text)
                .css({
                    visibility: 'hidden',
                    whiteSpace: 'nowrap',
                    position: 'absolute'
                })
                .appendTo('body');

            let overflows = testElement.width() > $('.code').width();
            testElement.remove();
            return overflows;
        }

        
        function getRandomASCII(len) {
            let chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&';
            let asciiStr = Array.from({ length: len }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
            return willOverflow(asciiStr) ? originalText : asciiStr;
        }

        
        function getRandomHexChar() {
            let hexChars = '0123456789ABCDEF';
            return hexChars[Math.floor(Math.random() * hexChars.length)];
        }

        function generateInitialObfuscation() {
            obfuscatedText = getRandomASCII(OGarray.length).split('');
            $('.code').text(obfuscatedText.join(''));
        }

        function gradualHexConversionStep() {
            let unfinishedIndices = Array.from({length: OGarray.length}, (_, i) => i).filter(i => {
                let count = convertedIndices.get(i) || 0;
                return count < hexTransformations;
            });

            if (unfinishedIndices.length > 0) {
                let randomIndex = unfinishedIndices[Math.floor(Math.random() * unfinishedIndices.length)];
                let currentCount = convertedIndices.get(randomIndex) || 0;

                if (currentCount < hexTransformations) {
                    let tempText = [...obfuscatedText];
                    tempText[randomIndex] = getRandomHexChar(); 

                    if (!willOverflow(tempText.join(''))) {
                        obfuscatedText[randomIndex] = tempText[randomIndex];
                        convertedIndices.set(randomIndex, currentCount + 1);
                        $('.code').text(obfuscatedText.join(''));
                    }
                }
            } else {
                clearInterval(interval);
                setTimeout(() => {
                    phase = 3;
                    revealIndex = 0;
                    interval = setInterval(decryptStep, 50);
                }, 0);
            }
        }

        function decryptStep() {
            if (revealIndex < OGarray.length) {
                let tempText = [...obfuscatedText];
                tempText[revealIndex] = OGarray[revealIndex]; 

                if (!willOverflow(tempText.join(''))) {
                    obfuscatedText[revealIndex] = tempText[revealIndex];
                    $('.code').text(obfuscatedText.join(''));
                    revealIndex++;
                }
            }

            if (revealIndex >= OGarray.length) {
                clearInterval(interval);
                $('.code').text(originalText); 
            }
        }

        generateInitialObfuscation();

        setTimeout(() => {
            interval = setInterval(() => {
                if (phase === 2) {
                    gradualHexConversionStep();
                }
            }, intervalTime);

            setTimeout(() => {
                phase = 2;
            }, 0);
        }, delayBeforeStart);
    }

    start();
});



</script>
