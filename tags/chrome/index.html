<script>
$(document).ready(function () {
    function start() {
        var originalText = $('.code').text().trim(); 
        var OGarray = originalText.split(''); 
        var obfuscatedText;
        var revealIndex = 0; 
        var duration = 3000; 
        var intervalTime = 30; 
        var delayBeforeStart = 500; 
        var phase = 1; 
        var convertedIndices = new Set(); 
        var interval; 

        
        function getRandomASCII(len) {
            let chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&';
            return Array.from({ length: len }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
        }

        
        function getRandomHexChar() {
            let hexChars = '0123456789ABCDEF';
            return hexChars[Math.floor(Math.random() * hexChars.length)];
        }

        function generateInitialObfuscation() {
            obfuscatedText = getRandomASCII(OGarray.length).split('');
            $('.code').text(obfuscatedText.join(''));
        }

        function gradualHexConversionStep() {
            if (convertedIndices.size < OGarray.length) {
                let index;
                do {
                    index = Math.floor(Math.random() * OGarray.length);
                } while (convertedIndices.has(index));

                obfuscatedText[index] = getRandomHexChar(); 
                convertedIndices.add(index);
                $('.code').text(obfuscatedText.join(''));
            }

            if (convertedIndices.size >= OGarray.length) {
                clearInterval(interval);
                setTimeout(() => {
                    phase = 3;
                    revealIndex = 0;
                    interval = setInterval(decryptStep, intervalTime);
                }, 100);
            }
        }

        function decryptStep() {
            if (revealIndex < OGarray.length) {
                obfuscatedText[revealIndex] = OGarray[revealIndex]; 
                $('.code').text(obfuscatedText.join(''));
                revealIndex++;
            }

            if (revealIndex >= OGarray.length) {
                clearInterval(interval);
                $('.code').text(originalText); 
            }
        }

        generateInitialObfuscation();

        setTimeout(() => {
            interval = setInterval(() => {
                if (phase === 2) {
                    gradualHexConversionStep();
                }
            }, intervalTime);

            setTimeout(() => {
                phase = 2;
            }, 100);
        }, delayBeforeStart);
    }

    start();
});

</script>
