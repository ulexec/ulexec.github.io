<script>
document.addEventListener('DOMContentLoaded', function () {
    var el = document.querySelector('.code');
    if (!el) return;

    var originalText = el.textContent.trim();
    var chars = originalText.split('');
    var finalLen = chars.length;

    var hexPool = '0123456789ABCDEFabcdef';

    
    var startLen = Math.max(1, finalLen - 2 - Math.floor(Math.random() * 3));
    var shrinkDuration = 600;

    
    
    
    
    
    var scrambleDuration = 700;
    
    var flickerPerChar = 300;
    
    var charDelay = 80;

    
    var display = [];
    for (var i = 0; i < startLen; i++) {
        display.push(hexPool[Math.floor(Math.random() * hexPool.length)]);
    }
    el.textContent = display.join('');

    var startTime = null;
    var lastFrame = 0;
    var solvedCount = 0;
    var solved = new Array(finalLen).fill(false);
    var charSolveStart = new Array(finalLen); 

    
    var growEnd = shrinkDuration;
    var solvePhaseStart = growEnd + scrambleDuration;
    for (var i = 0; i < finalLen; i++) {
        if (chars[i] === ' ') {
            solved[i] = true;
            solvedCount++;
            charSolveStart[i] = 0;
        } else {
            charSolveStart[i] = solvePhaseStart + i * charDelay;
        }
    }

    function frame(ts) {
        if (!startTime) startTime = ts;
        if (ts - lastFrame < 50) { requestAnimationFrame(frame); return; }
        lastFrame = ts;

        var elapsed = ts - startTime;

        
        if (elapsed < shrinkDuration) {
            var t = elapsed / shrinkDuration;
            var targetLen = Math.round(startLen + (finalLen - startLen) * t * t);

            while (display.length < targetLen) {
                display.splice(Math.floor(Math.random() * (display.length + 1)), 0,
                    hexPool[Math.floor(Math.random() * hexPool.length)]);
            }
            for (var i = 0; i < display.length; i++) {
                display[i] = hexPool[Math.floor(Math.random() * hexPool.length)];
            }

            el.textContent = display.join('');
            requestAnimationFrame(frame);
            return;
        }

        
        if (display.length !== finalLen) {
            display = new Array(finalLen);
            for (var i = 0; i < finalLen; i++) {
                display[i] = chars[i] === ' ' ? ' ' : hexPool[Math.floor(Math.random() * hexPool.length)];
            }
        }

        
        for (var i = 0; i < finalLen; i++) {
            if (solved[i]) {
                display[i] = chars[i];
                continue;
            }

            if (elapsed >= charSolveStart[i] + flickerPerChar) {
                
                solved[i] = true;
                solvedCount++;
                display[i] = chars[i];
            } else if (elapsed >= charSolveStart[i]) {
                
                var ft = (elapsed - charSolveStart[i]) / flickerPerChar;
                display[i] = Math.random() < ft * 0.5
                    ? chars[i]
                    : hexPool[Math.floor(Math.random() * hexPool.length)];
            } else {
                
                if (Math.random() > 0.4) {
                    display[i] = hexPool[Math.floor(Math.random() * hexPool.length)];
                }
            }
        }

        el.textContent = display.join('');

        if (solvedCount < finalLen) {
            requestAnimationFrame(frame);
        } else {
            el.textContent = originalText;
        }
    }

    setTimeout(function () {
        requestAnimationFrame(frame);
    }, 400);
});
</script>
